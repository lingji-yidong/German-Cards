name: iOS Build

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build GermanCards
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4 when available
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          fi

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcode-select -p
          swift --version

      - name: List project
        run: xcodebuild -list -project GermanCards.xcodeproj

      - name: Build
        run: |
          xcodebuild \
            -project GermanCards.xcodeproj \
            -scheme GermanCards \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
