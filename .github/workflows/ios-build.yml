name: Apple Builds

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build GermanCards (${{ matrix.destination_name }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - destination_name: iOS
            destination: generic/platform=iOS
            configuration: Debug
            result_bundle: build/GermanCards-iOS.xcresult
          - destination_name: Mac Catalyst
            destination: generic/platform=macOS,variant=Mac Catalyst
            configuration: Release
            result_bundle: build/GermanCards-MacCatalyst.xcresult
            package_desktop: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4 when available
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          fi

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcode-select -p
          swift --version

      - name: List project
        run: xcodebuild -list -project GermanCards.xcodeproj

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project GermanCards.xcodeproj \
            -scheme GermanCards \
            -configuration '${{ matrix.configuration }}' \
            -destination '${{ matrix.destination }}' \
            -derivedDataPath build/DerivedData \
            -resultBundlePath '${{ matrix.result_bundle }}' \
            CODE_SIGNING_ALLOWED=NO \
            build | tee build.log

      - name: Package Mac Catalyst app
        if: matrix.package_desktop == true
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/${{ matrix.configuration }}-maccatalyst/GermanCards.app"
          ARTIFACT_DIR="build/artifacts"
          mkdir -p "$ARTIFACT_DIR"
          ditto -c -k --keepParent "$APP_PATH" "$ARTIFACT_DIR/GermanCards-macOS.zip"
          hdiutil create \
            -volname "GermanCards" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$ARTIFACT_DIR/GermanCards-macOS.dmg"

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-diagnostics-${{ matrix.destination_name }}
          path: |
            build.log
            build/*.xcresult
          if-no-files-found: ignore

      - name: Upload Mac Catalyst app
        if: matrix.package_desktop == true
        uses: actions/upload-artifact@v4
        with:
          name: GermanCards-macOS-unsigned
          path: |
            build/artifacts/GermanCards-macOS.zip
            build/artifacts/GermanCards-macOS.dmg
          if-no-files-found: error
