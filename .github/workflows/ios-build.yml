name: Apple Builds

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build GermanCards (${{ matrix.destination_name }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - destination_name: iOS
            destination: generic/platform=iOS
            configuration: Release
            result_bundle: GermanCards-iOS.xcresult
            package_ios: true
          - destination_name: Universal Mac
            destination: generic/platform=macOS,variant=Mac Catalyst
            configuration: Release
            result_bundle: GermanCards-UniversalMac.xcresult
            package_desktop: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4 when available
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          fi

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcode-select -p
          swift --version

      - name: List project
        run: xcodebuild -list -project GermanCards.xcodeproj

      - name: Build
        run: |
          set -o pipefail
          EXTRA_SETTINGS=()
          if [ "${{ matrix.package_desktop }}" = "true" ]; then
            EXTRA_SETTINGS+=(ARCHS="arm64 x86_64" ONLY_ACTIVE_ARCH=NO)
          fi

          DERIVED_DATA_PATH="$RUNNER_TEMP/GermanCardsDerivedData"
          RESULT_BUNDLE_PATH="$RUNNER_TEMP/${{ matrix.result_bundle }}"
          BUILD_LOG_PATH="$RUNNER_TEMP/build-${{ matrix.destination_name }}.log"

          xcodebuild \
            -project GermanCards.xcodeproj \
            -scheme GermanCards \
            -configuration '${{ matrix.configuration }}' \
            -destination '${{ matrix.destination }}' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath "$RESULT_BUNDLE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            "${EXTRA_SETTINGS[@]}" \
            build | tee "$BUILD_LOG_PATH"

      - name: Package universal Mac installer
        if: matrix.package_desktop == true
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/GermanCardsDerivedData/Build/Products/${{ matrix.configuration }}-maccatalyst/GermanCards.app"
          ARTIFACT_DIR="$RUNNER_TEMP/artifacts"
          STAGING_DIR="$RUNNER_TEMP/pkg-root"
          DMG_DIR="$RUNNER_TEMP/dmg-root"
          COMPONENT_PKG="$ARTIFACT_DIR/GermanCards-component.pkg"
          INSTALLER_PKG="$ARTIFACT_DIR/GermanCards-macOS-universal.pkg"

          mkdir -p "$ARTIFACT_DIR" "$STAGING_DIR/Applications" "$DMG_DIR"

          APP_BINARY="$APP_PATH/Contents/MacOS/GermanCards"
          lipo -archs "$APP_BINARY"
          lipo "$APP_BINARY" -verify_arch arm64 x86_64

          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          ditto "$APP_PATH" "$STAGING_DIR/Applications/GermanCards.app"
          ditto -c -k --keepParent "$APP_PATH" "$ARTIFACT_DIR/GermanCards-macOS-universal.zip"

          pkgbuild \
            --root "$STAGING_DIR" \
            --identifier "uk.habseligkeiten.GermanCards" \
            --version "1.0.5" \
            --install-location "/" \
            "$COMPONENT_PKG"

          productbuild \
            --package "$COMPONENT_PKG" \
            "$INSTALLER_PKG"

          cp -R "$APP_PATH" "$DMG_DIR/GermanCards.app"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create \
            -volname "GermanCards" \
            -srcfolder "$DMG_DIR" \
            -ov \
            -format UDZO \
            "$ARTIFACT_DIR/GermanCards-macOS-universal.dmg"

      - name: Package unsigned iOS build
        if: matrix.package_ios == true
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/GermanCardsDerivedData/Build/Products/${{ matrix.configuration }}-iphoneos/GermanCards.app"
          ARTIFACT_DIR="$RUNNER_TEMP/artifacts"
          PAYLOAD_DIR="$RUNNER_TEMP/ios-payload/Payload"

          mkdir -p "$ARTIFACT_DIR" "$PAYLOAD_DIR"
          ditto "$APP_PATH" "$PAYLOAD_DIR/GermanCards.app"
          ditto -c -k --keepParent "$APP_PATH" "$ARTIFACT_DIR/GermanCards-iOS-unsigned-app.zip"
          ditto -c -k "$RUNNER_TEMP/ios-payload" "$ARTIFACT_DIR/GermanCards-iOS-unsigned.ipa"

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-diagnostics-${{ matrix.destination_name }}
          path: |
            ${{ runner.temp }}/build-${{ matrix.destination_name }}.log
            ${{ runner.temp }}/${{ matrix.result_bundle }}
          if-no-files-found: ignore

      - name: Upload universal Mac package
        if: matrix.package_desktop == true
        uses: actions/upload-artifact@v4
        with:
          name: GermanCards-macOS-universal
          path: |
            ${{ runner.temp }}/artifacts/GermanCards-macOS-universal.pkg
            ${{ runner.temp }}/artifacts/GermanCards-macOS-universal.zip
            ${{ runner.temp }}/artifacts/GermanCards-macOS-universal.dmg
          if-no-files-found: error

      - name: Upload unsigned iOS package
        if: matrix.package_ios == true
        uses: actions/upload-artifact@v4
        with:
          name: GermanCards-iOS-unsigned
          path: |
            ${{ runner.temp }}/artifacts/GermanCards-iOS-unsigned-app.zip
            ${{ runner.temp }}/artifacts/GermanCards-iOS-unsigned.ipa
          if-no-files-found: error

  release:
    name: Publish Apple release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged builds
        uses: actions/download-artifact@v4
        with:
          pattern: GermanCards-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          {
            echo "GermanCards builds for macOS and iOS."
            echo
            echo "The macOS app is ad-hoc signed and is not Developer ID signed or notarized."
            echo "The iOS app is unsigned and must be signed with your own Apple Developer identity and provisioning profile before it can be installed on a device."
            echo "These builds are provided as-is. Review the source and build it yourself if you need stronger trust guarantees."
          } > "$NOTES_FILE"

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber release-assets/*
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "GermanCards $GITHUB_REF_NAME" \
              --notes-file "$NOTES_FILE" \
              release-assets/*
          fi
